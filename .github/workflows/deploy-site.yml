name: Deploy Site - Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_run:
    workflows:
      - "Blog Auto · Publication"
      - "Horoscope Auto · Génération quotidienne 11 langues"
      - "Rebuild Guard · Daily touch for scheduled articles"
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # Runners VPS Hetzner périodiquement saturés (ENOSPC). Deploy est critique
    # pour la visibilité, on tourne sur ubuntu-latest. Pattern aligné adapte-toi.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build Astro site
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name=karmastro-site --branch=main --commit-dirty=true
