name: Deploy Site - Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_run:
    workflows:
      - "Blog Auto · Publication"
      - "Horoscope Auto · Génération quotidienne 11 langues"
      - "Rebuild Guard · Daily touch for scheduled articles"
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # Runners VPS Hetzner périodiquement saturés (ENOSPC). Deploy est critique
    # pour la visibilité, on tourne sur ubuntu-latest. Pattern aligné adapte-toi.
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build Astro site
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: site
          command: pages deploy dist --project-name=karmastro-site --branch=main --commit-dirty=true

      - name: Purge CF cache for SEO-critical files
        # Activates once CF_PURGE_TOKEN secret is set (Phase 3 of deploy hardening).
        # Until then this step gracefully no-ops -- safe to merge.
        if: success()
        env:
          CF_PURGE_TOKEN: ${{ secrets.CF_PURGE_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          SITE_URL: https://karmastro.com
        run: |
          if [ -z "$CF_PURGE_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "CF_PURGE_TOKEN or CF_ZONE_ID missing, skip (Phase 3 not yet wired)"; exit 0;
          fi
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_PURGE_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"files\":[\"$SITE_URL/robots.txt\",\"$SITE_URL/sitemap.xml\",\"$SITE_URL/sitemap-index.xml\",\"$SITE_URL/llms.txt\",\"$SITE_URL/llms-full.txt\",\"$SITE_URL/ai-sitemap.xml\"]}" || true

      - name: Ping IndexNow
        if: success()
        env:
          SITE_URL: https://karmastro.com
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: python3 scripts/indexnow_ping.py || true
