name: Rebuild Guard · Daily touch for scheduled articles

# Garantit qu'au moins un push/jour declenche un rebuild Cloudflare Pages,
# pour que les articles du blog programmes (date future) deviennent live
# pile a leur date meme si blog-auto ou horoscope-auto n'ont rien commit.
#
# Ecrit la date du jour dans site/.last-rebuild.txt et push si change.

on:
  schedule:
    # 03:00 UTC = 05:00 Paris (CEST) / 04:00 Paris (CET)
    # Tourne avant horoscope-auto (04:00 UTC) pour que les articles
    # programmes du jour soient live des le premier rebuild matinal.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  touch:
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "Karmastro Rebuild Guard"
          git config user.email "rebuild@karmastro.com"

      - name: Commit and push rebuild marker
        run: |
          git config user.name "Karmastro Rebuild Guard"
          git config user.email "rebuild@karmastro.com"
          # Reset-then-recreate pattern: never conflict on concurrent timestamp writes.
          # Always re-anchors to origin/main on a real branch so push from detached HEAD impossible.
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            git fetch origin
            git checkout -B main origin/main
            echo "$(date -u +%Y-%m-%d)" > site/.last-rebuild.txt
            git add site/.last-rebuild.txt
            if git diff --cached --quiet; then echo "no changes" && exit 0; fi
            git commit -m "chore: rebuild guard $(date -u +%Y-%m-%d)"
            if git push origin main; then exit 0; fi
            echo "push attempt $i failed, retrying..."
            sleep $((2 + RANDOM % 6))
          done
          echo "push failed after 5 attempts" >&2
          exit 1
