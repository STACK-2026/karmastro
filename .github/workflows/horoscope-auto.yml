name: Horoscope Auto — Génération quotidienne 11 langues

on:
  schedule:
    # 04:00 UTC = 06:00 Paris (CEST)
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Régénérer même si le fichier existe'
        type: boolean
        default: false
      lang:
        description: "Langues à générer (csv ou 'all')"
        type: string
        default: 'all'
      backfill_days:
        description: "Backfill N derniers jours (0 = désactivé, normal today+J+1)"
        type: string
        default: '0'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "Karmastro Horoscope Auto"
          git config user.email "horoscope@karmastro.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r horoscope-auto/requirements.txt

      - name: Generate today in all languages
        if: github.event.inputs.backfill_days == '' || github.event.inputs.backfill_days == '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENGINE_URL: http://168.119.229.20:8100
        run: |
          cd horoscope-auto
          LANG_ARG="${{ github.event.inputs.lang || 'all' }}"
          FORCE_ARG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE_ARG="--force"; fi
          python generate.py --lang "${LANG_ARG}" ${FORCE_ARG}

      - name: Generate tomorrow preview in all languages
        if: github.event.inputs.backfill_days == '' || github.event.inputs.backfill_days == '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENGINE_URL: http://168.119.229.20:8100
        run: |
          cd horoscope-auto
          TOMORROW=$(date -u -d tomorrow +%Y-%m-%d 2>/dev/null || date -u -v+1d +%Y-%m-%d)
          LANG_ARG="${{ github.event.inputs.lang || 'all' }}"
          python generate.py --date "${TOMORROW}" --lang "${LANG_ARG}"

      - name: Backfill last N days (skip existing files)
        if: github.event.inputs.backfill_days != '' && github.event.inputs.backfill_days != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENGINE_URL: http://168.119.229.20:8100
        run: |
          cd horoscope-auto
          LANG_ARG="${{ github.event.inputs.lang || 'all' }}"
          N="${{ github.event.inputs.backfill_days }}"
          for i in $(seq 1 "$N"); do
            d=$(date -u -d "-$i days" +%Y-%m-%d 2>/dev/null || date -u -v-${i}d +%Y-%m-%d)
            echo "[backfill] $d in langs=$LANG_ARG"
            python generate.py --date "$d" --lang "$LANG_ARG" || echo "[warn] $d failed, continuing"
          done

      - name: Commit and push if changed
        run: |
          git add site/src/data/horoscope/
          if git diff --cached --quiet; then
            echo "No horoscope changes to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "horoscope: génération quotidienne ${DATE} (11 langues + J+1)"
            git push
          fi
