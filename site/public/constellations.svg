<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none" opacity="0.15">
  <!-- Constellation sketch lines -->
  <g stroke="white" stroke-width="0.8" stroke-linecap="round" stroke-dasharray="4 2">
    <!-- Grande Ourse — top-left -->
    <line x1="60" y1="100" x2="120" y2="80"/>
    <line x1="120" y1="80" x2="170" y2="110"/>
    <line x1="170" y1="110" x2="200" y2="160"/>
    <line x1="200" y1="160" x2="160" y2="200"/>
    <line x1="160" y1="200" x2="110" y2="190"/>
    <line x1="110" y1="190" x2="80" y2="150"/>
    <line x1="80" y1="150" x2="60" y2="100"/>
  </g>

  <g stroke="hsl(271 91% 65%)" stroke-width="0.6" stroke-linecap="round">
    <!-- Cassiopeia W -->
    <line x1="800" y1="60" x2="850" y2="120"/>
    <line x1="850" y1="120" x2="900" y2="50"/>
    <line x1="900" y1="50" x2="950" y2="110"/>
    <line x1="950" y1="110" x2="1000" y2="40"/>
    <!-- Scorpion tail -->
    <line x1="100" y1="550" x2="140" y2="580"/>
    <line x1="140" y1="580" x2="160" y2="620"/>
    <line x1="160" y1="620" x2="200" y2="640"/>
    <line x1="200" y1="640" x2="250" y2="630"/>
    <line x1="250" y1="630" x2="280" y2="600"/>
    <line x1="280" y1="600" x2="270" y2="570"/>
    <!-- Sagittarius arrow -->
    <line x1="500" y1="400" x2="600" y2="340"/>
    <line x1="590" y1="350" x2="600" y2="340"/>
    <line x1="600" y1="340" x2="595" y2="355"/>
  </g>

  <g stroke="hsl(43 76% 53%)" stroke-width="0.6" stroke-linecap="round">
    <!-- Libra scales -->
    <line x1="1000" y1="350" x2="1050" y2="350"/>
    <line x1="1025" y1="350" x2="1025" y2="300"/>
    <line x1="1000" y1="300" x2="1025" y2="280"/>
    <line x1="1025" y1="280" x2="1050" y2="300"/>
    <!-- Southern cross -->
    <line x1="1050" y1="520" x2="1050" y2="600"/>
    <line x1="1010" y1="560" x2="1090" y2="560"/>
  </g>

  <!-- Star dots at vertices -->
  <g fill="white">
    <circle cx="60" cy="100" r="2.5"/><circle cx="120" cy="80" r="3"/><circle cx="170" cy="110" r="2.5"/>
    <circle cx="200" cy="160" r="2"/><circle cx="160" cy="200" r="2.5"/><circle cx="110" cy="190" r="2"/><circle cx="80" cy="150" r="3"/>
    <circle cx="800" cy="60" r="2.5"/><circle cx="850" cy="120" r="3"/><circle cx="900" cy="50" r="2.5"/>
    <circle cx="950" cy="110" r="3"/><circle cx="1000" cy="40" r="2.5"/>
    <circle cx="100" cy="550" r="2"/><circle cx="140" cy="580" r="2.5"/><circle cx="160" cy="620" r="2"/>
    <circle cx="200" cy="640" r="2.5"/><circle cx="250" cy="630" r="2"/><circle cx="280" cy="600" r="2.5"/><circle cx="270" cy="570" r="2"/>
    <circle cx="500" cy="400" r="2"/><circle cx="600" cy="340" r="3"/>
    <circle cx="1000" cy="350" r="2"/><circle cx="1050" cy="350" r="2"/><circle cx="1025" cy="280" r="2.5"/>
    <circle cx="1050" cy="520" r="2.5"/><circle cx="1050" cy="600" r="2.5"/><circle cx="1010" cy="560" r="2"/><circle cx="1090" cy="560" r="2"/>
  </g>

  <!-- ======================================== -->
  <!-- ZODIAC SYMBOLS (12 signs scattered) -->
  <!-- ======================================== -->
  <g fill="hsl(271 91% 65%)" font-family="serif" opacity="0.55">
    <text x="250" y="130" font-size="24">&#9800;</text>   <!-- Aries ♈ -->
    <text x="700" y="180" font-size="22">&#9804;</text>   <!-- Leo ♌ -->
    <text x="350" y="650" font-size="20">&#9807;</text>   <!-- Scorpio ♏ -->
    <text x="1100" y="280" font-size="22">&#9811;</text>  <!-- Pisces ♓ -->
    <text x="580" y="520" font-size="18">&#9803;</text>   <!-- Cancer ♋ -->
    <text x="30" y="450" font-size="20">&#9805;</text>    <!-- Virgo ♍ -->
    <text x="1150" y="550" font-size="18">&#9808;</text>  <!-- Sagittarius ♐ -->
  </g>
  <g fill="hsl(43 76% 53%)" font-family="serif" opacity="0.4">
    <text x="150" y="380" font-size="20">&#9806;</text>   <!-- Libra ♎ -->
    <text x="900" y="500" font-size="22">&#9810;</text>   <!-- Aquarius ♒ -->
    <text x="680" y="80" font-size="18">&#9802;</text>    <!-- Gemini ♊ -->
    <text x="450" y="250" font-size="20">&#9809;</text>   <!-- Capricorn ♑ -->
    <text x="1050" y="180" font-size="18">&#9801;</text>  <!-- Taurus ♉ -->
  </g>

  <!-- ======================================== -->
  <!-- NUMEROLOGY NUMBERS (master numbers + key numbers) -->
  <!-- Discret, style croquis, flottant dans l'espace -->
  <!-- ======================================== -->

  <!-- Master numbers (violet, slightly larger) -->
  <g fill="hsl(271 91% 65%)" font-family="'Outfit', sans-serif" font-weight="300" opacity="0.35">
    <text x="310" y="95" font-size="16">11</text>
    <text x="760" y="320" font-size="18">22</text>
    <text x="1080" y="450" font-size="16">33</text>
  </g>

  <!-- Life path numbers (gold, small) -->
  <g fill="hsl(43 76% 53%)" font-family="'Outfit', sans-serif" font-weight="300" opacity="0.3">
    <text x="420" y="140" font-size="12">7</text>
    <text x="640" y="450" font-size="11">9</text>
    <text x="180" y="280" font-size="13">3</text>
    <text x="930" y="260" font-size="11">1</text>
    <text x="520" y="700" font-size="12">5</text>
    <text x="1130" y="650" font-size="11">8</text>
  </g>

  <!-- Karmic debt numbers (white, very subtle) -->
  <g fill="white" font-family="'Outfit', sans-serif" font-weight="200" opacity="0.2">
    <text x="75" y="680" font-size="10">13</text>
    <text x="850" y="700" font-size="9">14</text>
    <text x="380" y="480" font-size="10">16</text>
    <text x="1000" y="140" font-size="9">19</text>
  </g>

  <!-- Repeating / angel numbers (violet, ethereal) -->
  <g fill="hsl(271 91% 65%)" font-family="'Outfit', sans-serif" font-weight="200" opacity="0.2">
    <text x="540" y="200" font-size="9">111</text>
    <text x="330" y="550" font-size="8">444</text>
    <text x="720" y="620" font-size="9">777</text>
    <text x="1020" y="680" font-size="8">333</text>
  </g>

  <!-- Personal year / expression numbers (gold, tiny) -->
  <g fill="hsl(43 76% 53%)" font-family="'Outfit', sans-serif" font-weight="200" opacity="0.2">
    <text x="160" y="160" font-size="9">44</text>
    <text x="470" y="340" font-size="8">69</text>
    <text x="800" y="400" font-size="9">55</text>
    <text x="660" y="280" font-size="8">22</text>
    <text x="950" y="590" font-size="9">66</text>
  </g>

  <!-- ======================================== -->
  <!-- ORBIT CIRCLES + PLANETS -->
  <!-- ======================================== -->
  <g stroke="hsl(271 91% 65%)" stroke-width="0.5" fill="none" stroke-dasharray="6 4" opacity="0.35">
    <circle cx="400" cy="300" r="100"/>
    <circle cx="400" cy="300" r="55"/>
    <circle cx="850" cy="420" r="70"/>
  </g>
  <g fill="hsl(43 76% 53%)" opacity="0.5">
    <circle cx="500" cy="290" r="3"/>
    <circle cx="370" cy="200" r="2.5"/>
    <circle cx="920" cy="410" r="3"/>
  </g>

  <!-- Moon crescent -->
  <g stroke="hsl(43 76% 53%)" stroke-width="0.8" fill="none" opacity="0.4">
    <path d="M1120 150 A 20 20 0 1 1 1120 190 A 14 14 0 1 0 1120 150"/>
  </g>

  <!-- Sun rays -->
  <g stroke="hsl(43 76% 53%)" stroke-width="0.5" opacity="0.3">
    <circle cx="50" cy="350" r="8" fill="hsl(43 76% 53% / 0.15)"/>
    <line x1="50" y1="335" x2="50" y2="328"/><line x1="50" y1="365" x2="50" y2="372"/>
    <line x1="35" y1="350" x2="28" y2="350"/><line x1="65" y1="350" x2="72" y2="350"/>
    <line x1="39" y1="339" x2="34" y2="334"/><line x1="61" y1="361" x2="66" y2="366"/>
    <line x1="39" y1="361" x2="34" y2="366"/><line x1="61" y1="339" x2="66" y2="334"/>
  </g>

  <!-- ======================================== -->
  <!-- PLANETARY SYMBOLS (astro glyphs) -->
  <!-- ======================================== -->
  <g fill="hsl(271 91% 65%)" font-family="serif" opacity="0.25">
    <!-- Mercury ☿ -->
    <text x="340" y="420" font-size="14">&#9791;</text>
    <!-- Venus ♀ -->
    <text x="720" y="530" font-size="16">&#9792;</text>
    <!-- Mars ♂ -->
    <text x="1140" y="400" font-size="14">&#9794;</text>
    <!-- Jupiter ♃ -->
    <text x="60" y="240" font-size="15">&#9795;</text>
    <!-- Saturn ♄ -->
    <text x="870" y="150" font-size="14">&#9796;</text>
  </g>
  <g fill="hsl(43 76% 53%)" font-family="serif" opacity="0.2">
    <!-- Neptune ♆ -->
    <text x="480" y="600" font-size="13">&#9798;</text>
    <!-- Uranus ♅ -->
    <text x="1060" y="100" font-size="12">&#9797;</text>
    <!-- Pluto ♇ -->
    <text x="200" y="700" font-size="11">&#9799;</text>
  </g>
</svg>
