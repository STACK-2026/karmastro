<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none" opacity="0.15">
  <!-- Constellation sketch lines (hand-drawn feel with varying opacity) -->
  <g stroke="white" stroke-width="0.8" stroke-linecap="round" stroke-dasharray="4 2">
    <!-- Big bear / Grande Ourse — top-left -->
    <line x1="60" y1="100" x2="120" y2="80"/>
    <line x1="120" y1="80" x2="170" y2="110"/>
    <line x1="170" y1="110" x2="200" y2="160"/>
    <line x1="200" y1="160" x2="160" y2="200"/>
    <line x1="160" y1="200" x2="110" y2="190"/>
    <line x1="110" y1="190" x2="80" y2="150"/>
    <line x1="80" y1="150" x2="60" y2="100"/>
  </g>

  <g stroke="hsl(271 91% 65%)" stroke-width="0.6" stroke-linecap="round">
    <!-- Cassiopeia W — top center-right -->
    <line x1="800" y1="60" x2="850" y2="120"/>
    <line x1="850" y1="120" x2="900" y2="50"/>
    <line x1="900" y1="50" x2="950" y2="110"/>
    <line x1="950" y1="110" x2="1000" y2="40"/>

    <!-- Scorpion tail — bottom-left -->
    <line x1="100" y1="550" x2="140" y2="580"/>
    <line x1="140" y1="580" x2="160" y2="620"/>
    <line x1="160" y1="620" x2="200" y2="640"/>
    <line x1="200" y1="640" x2="250" y2="630"/>
    <line x1="250" y1="630" x2="280" y2="600"/>
    <line x1="280" y1="600" x2="270" y2="570"/>

    <!-- Sagittarius arrow — center -->
    <line x1="500" y1="400" x2="600" y2="340"/>
    <line x1="590" y1="350" x2="600" y2="340"/>
    <line x1="600" y1="340" x2="595" y2="355"/>
  </g>

  <g stroke="hsl(43 76% 53%)" stroke-width="0.6" stroke-linecap="round">
    <!-- Libra scales — right -->
    <line x1="1000" y1="350" x2="1050" y2="350"/>
    <line x1="1025" y1="350" x2="1025" y2="300"/>
    <line x1="1000" y1="300" x2="1025" y2="280"/>
    <line x1="1025" y1="280" x2="1050" y2="300"/>

    <!-- Cross / Southern cross — bottom-right -->
    <line x1="1050" y1="520" x2="1050" y2="600"/>
    <line x1="1010" y1="560" x2="1090" y2="560"/>
  </g>

  <!-- Star dots at vertices (larger, more visible) -->
  <g fill="white">
    <!-- Grande Ourse -->
    <circle cx="60" cy="100" r="2.5"/>
    <circle cx="120" cy="80" r="3"/>
    <circle cx="170" cy="110" r="2.5"/>
    <circle cx="200" cy="160" r="2"/>
    <circle cx="160" cy="200" r="2.5"/>
    <circle cx="110" cy="190" r="2"/>
    <circle cx="80" cy="150" r="3"/>
    <!-- Cassiopeia -->
    <circle cx="800" cy="60" r="2.5"/>
    <circle cx="850" cy="120" r="3"/>
    <circle cx="900" cy="50" r="2.5"/>
    <circle cx="950" cy="110" r="3"/>
    <circle cx="1000" cy="40" r="2.5"/>
    <!-- Scorpion -->
    <circle cx="100" cy="550" r="2"/>
    <circle cx="140" cy="580" r="2.5"/>
    <circle cx="160" cy="620" r="2"/>
    <circle cx="200" cy="640" r="2.5"/>
    <circle cx="250" cy="630" r="2"/>
    <circle cx="280" cy="600" r="2.5"/>
    <circle cx="270" cy="570" r="2"/>
    <!-- Arrow -->
    <circle cx="500" cy="400" r="2"/>
    <circle cx="600" cy="340" r="3"/>
    <!-- Libra -->
    <circle cx="1000" cy="350" r="2"/>
    <circle cx="1050" cy="350" r="2"/>
    <circle cx="1025" cy="280" r="2.5"/>
    <!-- Cross -->
    <circle cx="1050" cy="520" r="2.5"/>
    <circle cx="1050" cy="600" r="2.5"/>
    <circle cx="1010" cy="560" r="2"/>
    <circle cx="1090" cy="560" r="2"/>
  </g>

  <!-- Zodiac symbols — more visible, scattered like sketch annotations -->
  <g fill="hsl(271 91% 65%)" font-family="serif" opacity="0.6">
    <text x="250" y="130" font-size="24">&#9800;</text>  <!-- Aries -->
    <text x="700" y="180" font-size="22">&#9804;</text>  <!-- Leo -->
    <text x="350" y="650" font-size="20">&#9807;</text>  <!-- Scorpio -->
    <text x="1100" y="280" font-size="22">&#9811;</text>  <!-- Pisces -->
    <text x="580" y="520" font-size="18">&#9803;</text>  <!-- Cancer -->
  </g>

  <g fill="hsl(43 76% 53%)" font-family="serif" opacity="0.45">
    <text x="150" y="380" font-size="20">&#9806;</text>  <!-- Libra -->
    <text x="900" y="500" font-size="22">&#9810;</text>  <!-- Aquarius -->
    <text x="680" y="80" font-size="18">&#9802;</text>   <!-- Gemini -->
    <text x="450" y="250" font-size="20">&#9809;</text>  <!-- Capricorn -->
  </g>

  <!-- Orbit circles (sketch-like, dashed) -->
  <g stroke="hsl(271 91% 65%)" stroke-width="0.5" fill="none" stroke-dasharray="6 4" opacity="0.35">
    <circle cx="400" cy="300" r="100"/>
    <circle cx="400" cy="300" r="55"/>
    <circle cx="850" cy="420" r="70"/>
  </g>

  <!-- Small "planet" dots on orbits -->
  <g fill="hsl(43 76% 53%)" opacity="0.5">
    <circle cx="500" cy="290" r="3"/>
    <circle cx="370" cy="200" r="2.5"/>
    <circle cx="920" cy="410" r="3"/>
  </g>

  <!-- Moon crescent sketch — top right -->
  <g stroke="hsl(43 76% 53%)" stroke-width="0.8" fill="none" opacity="0.4">
    <path d="M1120 150 A 20 20 0 1 1 1120 190 A 14 14 0 1 0 1120 150"/>
  </g>

  <!-- Sun rays sketch — center left -->
  <g stroke="hsl(43 76% 53%)" stroke-width="0.5" opacity="0.3">
    <circle cx="50" cy="350" r="8" fill="hsl(43 76% 53% / 0.15)"/>
    <line x1="50" y1="335" x2="50" y2="328"/>
    <line x1="50" y1="365" x2="50" y2="372"/>
    <line x1="35" y1="350" x2="28" y2="350"/>
    <line x1="65" y1="350" x2="72" y2="350"/>
    <line x1="39" y1="339" x2="34" y2="334"/>
    <line x1="61" y1="361" x2="66" y2="366"/>
    <line x1="39" y1="361" x2="34" y2="366"/>
    <line x1="61" y1="339" x2="66" y2="334"/>
  </g>
</svg>
