<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none" opacity="0.15">
  <!-- Constellation lines -->
  <g stroke="white" stroke-width="0.8" stroke-linecap="round" stroke-dasharray="4 2">
    <line x1="60" y1="100" x2="120" y2="80"/><line x1="120" y1="80" x2="170" y2="110"/>
    <line x1="170" y1="110" x2="200" y2="160"/><line x1="200" y1="160" x2="160" y2="200"/>
    <line x1="160" y1="200" x2="110" y2="190"/><line x1="110" y1="190" x2="60" y2="100"/>
  </g>
  <g stroke="hsl(271 91% 65%)" stroke-width="0.6" stroke-linecap="round">
    <line x1="800" y1="60" x2="850" y2="120"/><line x1="850" y1="120" x2="900" y2="50"/>
    <line x1="900" y1="50" x2="950" y2="110"/><line x1="950" y1="110" x2="1000" y2="40"/>
    <line x1="100" y1="550" x2="140" y2="580"/><line x1="140" y1="580" x2="200" y2="640"/>
    <line x1="500" y1="400" x2="600" y2="340"/>
  </g>

  <!-- Star dots -->
  <g fill="white">
    <circle cx="60" cy="100" r="2.5"/><circle cx="120" cy="80" r="3"/><circle cx="170" cy="110" r="2.5"/>
    <circle cx="200" cy="160" r="2"/><circle cx="160" cy="200" r="2.5"/>
    <circle cx="800" cy="60" r="2.5"/><circle cx="900" cy="50" r="2.5"/><circle cx="1000" cy="40" r="2.5"/>
    <circle cx="500" cy="400" r="2"/><circle cx="600" cy="340" r="3"/>
  </g>

  <!-- ZODIAC — Premium SVG paths (geometric, minimal, modern) -->

  <!-- Aries -->
  <g transform="translate(250,120)" fill="none" stroke="hsl(271 91% 65%)" stroke-width="1.2" opacity="0.5">
    <path d="M-6 10 C-6 0 0-8 6-8 C12-8 12 0 6 6 M6 10 C6 0 0-8-6-8 C-12-8-12 0-6 6" stroke-linecap="round"/>
  </g>

  <!-- Taurus -->
  <g transform="translate(1050,170)" fill="none" stroke="hsl(43 76% 53%)" stroke-width="1.2" opacity="0.4">
    <circle cx="0" cy="4" r="6"/><path d="M-7-4 C-7-10 0-12 0-6 C0-12 7-10 7-4" stroke-linecap="round"/>
  </g>

  <!-- Gemini -->
  <g transform="translate(680,75)" fill="none" stroke="hsl(271 91% 65%)" stroke-width="1.1" opacity="0.45">
    <line x1="-6" y1="-8" x2="-6" y2="8"/><line x1="6" y1="-8" x2="6" y2="8"/>
    <path d="M-8-8 C-4-12 4-12 8-8"/><path d="M-8 8 C-4 12 4 12 8 8"/>
  </g>

  <!-- Cancer -->
  <g transform="translate(30,450)" fill="none" stroke="hsl(271 91% 65%)" stroke-width="1.1" opacity="0.4">
    <path d="M-4-2 A4 4 0 1 1 4-2 M4 2 A4 4 0 1 1-4 2" stroke-linecap="round"/>
  </g>

  <!-- Leo -->
  <g transform="translate(700,175)" fill="none" stroke="hsl(43 76% 53%)" stroke-width="1.2" opacity="0.45">
    <circle cx="4" cy="6" r="3"/><path d="M-6-6 C-6 0 0 4 4 3" stroke-linecap="round"/>
  </g>

  <!-- Libra -->
  <g transform="translate(1100,280)" fill="none" stroke="hsl(43 76% 53%)" stroke-width="1.1" opacity="0.4">
    <line x1="-8" y1="4" x2="8" y2="4"/><path d="M-6-2 C-6-8 6-8 6-2" stroke-linecap="round"/>
    <line x1="-8" y1="8" x2="8" y2="8"/>
  </g>

  <!-- Scorpio -->
  <g transform="translate(350,650)" fill="none" stroke="hsl(271 91% 65%)" stroke-width="1.1" opacity="0.4">
    <path d="M-6-6 L-6 6 M-2-6 L-2 6 M2-6 L2 6 L6 2 L8 6" stroke-linecap="round"/>
  </g>

  <!-- Sagittarius -->
  <g transform="translate(450,250)" fill="none" stroke="hsl(43 76% 53%)" stroke-width="1.1" opacity="0.35">
    <line x1="-6" y1="6" x2="6" y2="-6"/><line x1="2" y1="-6" x2="6" y2="-6"/>
    <line x1="6" y1="-6" x2="6" y2="-2"/>
  </g>

  <!-- Aquarius -->
  <g transform="translate(1140,550)" fill="none" stroke="hsl(43 76% 53%)" stroke-width="1.1" opacity="0.4">
    <path d="M-8-2 L-4 2 L0-2 L4 2 L8-2" stroke-linecap="round"/>
    <path d="M-8 4 L-4 8 L0 4 L4 8 L8 4" stroke-linecap="round"/>
  </g>

  <!-- Pisces -->
  <g transform="translate(1100,100)" fill="none" stroke="hsl(271 91% 65%)" stroke-width="1.1" opacity="0.45">
    <path d="M-6-8 C0-4 0 4-6 8 M6-8 C0-4 0 4 6 8" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0"/>
  </g>

  <!-- NUMEROLOGY -->
  <g fill="hsl(271 91% 65%)" font-family="'Outfit', sans-serif" font-weight="300" opacity="0.3">
    <text x="310" y="95" font-size="16">11</text>
    <text x="760" y="320" font-size="18">22</text>
    <text x="1080" y="450" font-size="16">33</text>
  </g>
  <g fill="hsl(43 76% 53%)" font-family="'Outfit', sans-serif" font-weight="300" opacity="0.25">
    <text x="420" y="140" font-size="12">7</text>
    <text x="640" y="450" font-size="11">9</text>
    <text x="180" y="280" font-size="13">3</text>
  </g>

  <!-- Orbits -->
  <g stroke="hsl(271 91% 65%)" stroke-width="0.4" fill="none" stroke-dasharray="6 4" opacity="0.25">
    <circle cx="400" cy="300" r="100"/><circle cx="850" cy="420" r="70"/>
  </g>
  <g fill="hsl(43 76% 53%)" opacity="0.4">
    <circle cx="500" cy="290" r="2.5"/><circle cx="920" cy="410" r="2.5"/>
  </g>

  <!-- Moon -->
  <g stroke="hsl(43 76% 53%)" stroke-width="0.8" fill="none" opacity="0.35">
    <path d="M1120 150 A 20 20 0 1 1 1120 190 A 14 14 0 1 0 1120 150"/>
  </g>

  <!-- Planetary symbols (clean SVG paths) -->
  <g fill="none" stroke="hsl(271 91% 65%)" stroke-width="0.8" opacity="0.2">
    <g transform="translate(340,420)"><circle r="4"/><line x1="0" y1="4" x2="0" y2="10"/><line x1="-4" y1="7" x2="4" y2="7"/><path d="M-3-4 A5 5 0 0 1 3-4"/></g>
    <g transform="translate(720,530)"><circle r="5"/><line x1="0" y1="5" x2="0" y2="12"/><line x1="-3" y1="9" x2="3" y2="9"/></g>
    <g transform="translate(60,240)"><path d="M-6 0 L6 0 M2-8 L2 8 M-4-4 C0-8 6-6 2-2"/></g>
  </g>
</svg>
